<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocJet ⚡ - Professional PDF Maker</title>
    <style>
        :root { 
            --primary: #818cf8; 
            --secondary: #6366f1; 
            --bg: #0f172a; 
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --accent-yellow: #eab308;
        }
        
        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: var(--text-main);
            margin: 0; 
            padding: 0; 
        }

        .header { 
            background: var(--card-bg); 
            padding: 20px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); 
            text-align: center; 
            border-bottom: 1px solid #334155;
        }

        .search-container { margin: 15px auto; max-width: 90%; position: relative; }
        
        #searchInput { 
            width: 100%; 
            padding: 14px 20px; 
            border-radius: 12px; 
            border: 1px solid #334155; 
            background: #0f172a;
            color: white;
            outline: none; 
            box-sizing: border-box; 
            font-size: 16px;
        }

        #searchInput:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(129, 140, 248, 0.2); }

        .screen { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .recent-files { margin-top: 25px; text-align: left; max-width: 500px; margin-left: auto; margin-right: auto; }
        
        .file-item { 
            background: var(--card-bg); 
            border-radius: 16px; 
            margin-bottom: 15px; 
            border: 1px solid #334155; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2); 
            overflow: hidden; 
        }
        
        .file-info { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        .file-actions { display: flex; background: #1a2233; }
        
        .action-btn { 
            flex: 1; 
            padding: 14px; 
            text-align: center; 
            text-decoration: none; 
            font-size: 13px; 
            font-weight: 600; 
            border: none; 
            cursor: pointer; 
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .open-btn { background: transparent; color: var(--primary); border-right: 1px solid #334155; }
        .rename-btn { background: transparent; color: var(--accent-yellow); border-right: 1px solid #334155; }
        .download-btn { background: transparent; color: var(--accent-green); border-right: 1px solid #334155; }
        .delete-btn { background: transparent; color: var(--accent-red); flex: 0.5; }

        .action-btn:hover { background: rgba(255,255,255,0.05); }

        .create-btn { 
            position: fixed; bottom: 30px; right: 30px; 
            background: var(--primary); color: white; 
            width: 65px; height: 65px; border-radius: 20px; 
            border: none; font-size: 35px; cursor: pointer; 
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4); 
            z-index: 100; transition: 0.3s;
        }
        .create-btn:active { transform: scale(0.9); }

        .btn { padding: 15px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; font-size: 16px; transition: 0.3s; }
        .btn-green { background: var(--accent-green); color: white; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3); }
        
        .back-btn { background: none; border: none; font-size: 16px; cursor: pointer; margin-bottom: 20px; color: var(--primary); font-weight: 600; padding: 0; }

        .upload-box { 
            border: 2px dashed #475569; padding: 60px 20px; border-radius: 20px; 
            text-align: center; background: #1e293b; margin-top: 10px; cursor: pointer;
            transition: 0.3s;
        }
        .upload-box:hover { border-color: var(--primary); background: #243147; }

        #countTag { margin: 20px 0; color: var(--text-dim); font-weight: 500; font-size: 16px; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

<div id="homeScreen" class="screen active">
    <div class="header">
        <h1 style="margin:0; font-size: 28px; letter-spacing: -1px;">DocJet <span style="color:var(--primary)">⚡</span></h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search your files..." onkeyup="searchFiles()">
        </div>
    </div>

    <div class="recent-files">
        <h3 style="color: var(--text-dim); padding-left: 5px; font-size: 16px; text-transform: uppercase; letter-spacing: 1px;">Recent Documents 📂</h3>
        <div id="fileList">
            <p style="color:var(--text-dim); text-align: center; margin-top: 40px;">No files found.</p>
        </div>
    </div>

    <button class="create-btn" onclick="showScreen('createScreen')">+</button>
</div>

<div id="createScreen" class="screen">
    <button class="back-btn" onclick="showScreen('homeScreen')">← Back to Dashboard</button>
    <h2 style="text-align: center; margin-bottom: 30px;">Create New PDF</h2>
    
    <div class="upload-box" onclick="document.getElementById('imageInput').click()">
        <input type="file" id="imageInput" accept="image/*" multiple style="display: none;" onchange="handleFiles()">
        <span style="font-size: 50px;">🖼️</span><br>
        <strong style="color: var(--primary); font-size: 18px; display: block; margin-top: 10px;">Select Images</strong>
        <p style="font-size: 13px; color: var(--text-dim);">Import multiple images from gallery</p>
    </div>

    <p id="countTag" style="text-align: center;">Selected: 0 Images</p>
    
    <button class="btn btn-green" onclick="generatePDF()">GENERATE PDF 🚀</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
    let imageList = [];
    let savedFiles = JSON.parse(localStorage.getItem("pdfFiles")) || [];

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        if(screenId === 'homeScreen') renderFiles(savedFiles);
    }

    function handleFiles() {
        const files = document.getElementById('imageInput').files;
        if(files.length > 0) {
            for (let file of files) { imageList.push(file); }
            document.getElementById('countTag').innerText = "Selected: " + imageList.length + " Images";
        }
    }

    async function generatePDF() {
        if (imageList.length === 0) {
            alert("Please select images first!");
            return;
        }

        let userFileName = prompt("Enter PDF Name:", "Document_" + Date.now().toString().slice(-4));
        if (userFileName === null) return; 
        if (userFileName.trim() === "") userFileName = "DocJet_File";
        
        const finalName = userFileName + ".pdf";
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF();

        alert("Processing your PDF, please wait...");

        try {
            for (let i = 0; i < imageList.length; i++) {
                if (i > 0) pdf.addPage();
                const dataUrl = await new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onload = e => resolve(e.target.result);
                    reader.readAsDataURL(imageList[i]);
                });
                pdf.addImage(dataUrl, 'JPEG', 10, 10, 190, 277);
            }

            const base64PDF = pdf.output('datauristring');
            addToFileList(finalName, base64PDF);
            pdf.save(finalName);

            imageList = [];
            document.getElementById('countTag').innerText = "Selected: 0 Images";
            document.getElementById('imageInput').value = "";
            showScreen('homeScreen');
        } catch (error) {
            alert("Storage limit reached! Please delete some old files.");
        }
    }

    function addToFileList(name, data) {
        savedFiles.unshift({ name: name, data: data });
        updateStorage();
    }

    function renameFile(index) {
        let oldName = savedFiles[index].name.replace(".pdf", "");
        let newName = prompt("Rename to:", oldName);
        if (newName !== null && newName.trim() !== "") {
            savedFiles[index].name = newName.trim() + ".pdf";
            updateStorage();
        }
    }

    function deleteFile(index) {
        if(confirm("Are you sure you want to delete this file?")) {
            savedFiles.splice(index, 1);
            updateStorage();
        }
    }

    function updateStorage() {
        try {
            localStorage.setItem("pdfFiles", JSON.stringify(savedFiles));
            renderFiles(savedFiles);
        } catch (e) {
            alert("Memory Full! Delete old files.");
        }
    }

    function renderFiles(list) {
        const listDiv = document.getElementById('fileList');
        if (list.length === 0) {
            listDiv.innerHTML = "<p style='color:var(--text-dim); text-align: center; margin-top: 40px;'>No files found.</p>";
            return;
        }
        
        listDiv.innerHTML = list.map((file, index) => `
            <div class="file-item">
                <div class="file-info">
                    <span style="font-weight: 500;">📄 ${file.name}</span>
                    <span style="font-size: 10px; color: var(--accent-green); background: rgba(34, 197, 94, 0.1); padding: 4px 8px; border-radius: 20px;">READY</span>
                </div>
                <div class="file-actions">
                    <button class="action-btn open-btn" onclick="viewPDF(${index})">View</button>
                    <button class="action-btn rename-btn" onclick="renameFile(${index})">Edit</button>
                    <a href="${file.data}" download="${file.name}" class="action-btn download-btn">Save</a>
                    <button class="action-btn delete-btn" onclick="deleteFile(${index})">🗑️</button>
                </div>
            </div>
        `).join('');
    }

    function viewPDF(index) {
        const file = savedFiles[index];
        try {
            const base64Parts = file.data.split(',');
            const mime = base64Parts[0].match(/:(.*?);/)[1];
            const bstr = atob(base64Parts[1]);
            let n = bstr.length;
            const u8arr = new Uint8Array(n);
            while(n--) { u8arr[n] = bstr.charCodeAt(n); }
            const blob = new Blob([u8arr], {type: mime});
            const url = URL.createObjectURL(blob);
            window.location.href = url;
            setTimeout(() => URL.revokeObjectURL(url), 10000);
        } catch (e) {
            alert("Error opening file!");
        }
    }

    function searchFiles() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = savedFiles.filter(f => f.name.toLowerCase().includes(query));
        renderFiles(filtered);
    }
    
    renderFiles(savedFiles);
</script>

</body>
</html>
